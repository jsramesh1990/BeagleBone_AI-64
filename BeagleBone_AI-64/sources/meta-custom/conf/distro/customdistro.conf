# Custom distribution configuration for the BeagleBone AI-64 project

require conf/distro/poky.conf

# ============================================================================
# Distribution Identification
# ============================================================================
DISTRO = "customdistro"
DISTRO_NAME = "BBB AI-64 Custom Distribution"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "beagleai"

# ============================================================================
# Maintainer Information
# ============================================================================
MAINTAINER = "Your Name <your.email@example.com>"

# ============================================================================
# Distribution Features
# ============================================================================
DISTRO_FEATURES:append = " \
    systemd \
    wayland \
    x11 \
    opengl \
    vulkan \
    bluetooth \
    wifi \
    i2c \
    spi \
    gpio \
    usbhost \
    usbgadget \
    security \
    selinux \
    virtualization \
    containers \
    "

# ============================================================================
# Package Management
# ============================================================================
PACKAGE_CLASSES = "package_rpm"

# ============================================================================
# Init System
# ============================================================================
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:remove = "sysvinit"

# ============================================================================
# Release Information
# ============================================================================
RELEASE_DATE = "${@time.strftime('%Y%m%d',time.gmtime())}"
BUILD_ID = "${RELEASE_DATE}"

# ============================================================================
# End of customdistro.conf
# ============================================================================
