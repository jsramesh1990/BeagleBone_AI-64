# Machine configuration for BeagleBone Black AI-64

# ============================================================================
# Machine Identification
# ============================================================================
#@TYPE: Machine
#@NAME: BeagleBone Black AI-64
#@SOC: j721e
#@DESCRIPTION: Machine configuration for the BeagleBone Black AI-64 board

# ============================================================================
# Include Base Configuration
# ============================================================================
require conf/machine/include/ti-soc.inc
require conf/machine/include/bbbai64.inc

# ============================================================================
# Machine Features
# ============================================================================
MACHINE_FEATURES:append = " \
    bbbai64 \
    ai \
    ml \
    gpu \
    camera \
    display \
    audio \
    sensors \
    pci \
    "

# ============================================================================
# Kernel Configuration
# ============================================================================
PREFERRED_PROVIDER_virtual/kernel = "linux-ti"
PREFERRED_VERSION_linux-ti = "6.1%"

# Kernel device tree
KERNEL_DEVICETREE = " \
    ti/k3-j721e-beagleboneai64.dtb \
    ti/k3-j721e-beagleboneai64-imx219.dtbo \
    ti/k3-j721e-beagleboneai64-ov5640.dtbo \
    ${@bb.utils.contains('MACHINE_FEATURES', 'display', 'ti/k3-j721e-beagleboneai64-hdmi.dtbo', '', d)} \
    "

# Kernel configuration fragments
KERNEL_CONFIG_FRAGMENTS:append = " \
    ${@bb.utils.contains('MACHINE_FEATURES', 'ai', '${S}/arch/arm64/configs/bbbai64-ai.cfg', '', d)} \
    ${@bb.utils.contains('MACHINE_FEATURES', 'sensors', '${S}/arch/arm64/configs/bbbai64-sensors.cfg', '', d)} \
    "

# ============================================================================
# U-Boot Configuration
# ============================================================================
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-ti"
PREFERRED_VERSION_u-boot-ti = "2023.04%"

# ============================================================================
# Boot Configuration
# ============================================================================
# Boot device
BOOT_DEVICE = "mmcblk1"

# Kernel image
KERNEL_IMAGETYPE = "Image"

# ============================================================================
# Device Tree Overlays
# ============================================================================
# Enable device tree overlays for sensors and peripherals
BBBAI64_OVERLAYS:append = " \
    BB-BONE-AI-64-00A0.dtbo \
    BB-BONE-AI-64-SENSORS-00A0.dtbo \
    BB-BONE-AI-64-DISPLAY-00A0.dtbo \
    "

# ============================================================================
# Hardware Specific Settings
# ============================================================================
# I2C buses
I2C_BUSES = "0 1 2 3 4 5"

# SPI buses
SPI_BUSES = "0 1"

# GPIO pins
GPIO_PINS = "0-127"

# ============================================================================
# End of bbbai64.conf
# ============================================================================
