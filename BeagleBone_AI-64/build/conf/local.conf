# This file is your local configuration file and is where all local user settings
# are placed. The comments in this file give some guide to the options a new user
# to the system might want to change. Pretty much anything else can be changed
# by creating a append file in the conf directory, or by creating a layer.

# ============================================================================
# Machine Selection
# ============================================================================
# You need to select a specific machine to target the build with. There are a
# number of pre-defined machines which can be found in the meta layers.
MACHINE = "bbbai64"

# ============================================================================
# Distribution Configuration
# ============================================================================
# Set the distribution to use. The default is "poky" which is the reference
# distribution. You can also use "customdistro" from your meta-custom layer.
DISTRO = "poky"

# ============================================================================
# Package Management
# ============================================================================
# The default is to use RPM as the package format. Other options include:
# - package_deb (Debian/Ubuntu style)
# - package_ipk (Opkg style)
PACKAGE_CLASSES = "package_rpm"

# Extra image features. Options include:
# - dbg-pkgs: Add debug symbols
# - dev-pkgs: Add development packages
# - doc-pkgs: Add documentation packages
# - ssh-server-dropbear: Add Dropbear SSH server
# - ssh-server-openssh: Add OpenSSH server
# - tools-debug: Add debugging tools
# - tools-profile: Add profiling tools
# - tools-testapps: Add test applications
EXTRA_IMAGE_FEATURES = "debug-tweaks ssh-server-openssh tools-debug tools-profile"

# ============================================================================
# Build Settings
# ============================================================================
# Number of parallel threads to use for building (based on CPU cores)
BB_NUMBER_THREADS = "8"

# Number of parallel tasks to run (based on CPU cores)
PARALLEL_MAKE = "-j 8"

# ============================================================================
# Download Directory
# ============================================================================
# The directory where downloads are stored. This can be shared between builds.
DL_DIR = "${TOPDIR}/../downloads"

# ============================================================================
# Shared State Cache
# ============================================================================
# The directory where the shared state cache is stored. Sharing this between
# builds can significantly speed up build times.
SSTATE_DIR = "${TOPDIR}/../sstate-cache"

# ============================================================================
# Networking
# ============================================================================
# Enable network access for the build. This is required to fetch source code.
BB_NO_NETWORK = "0"

# Proxy settings (if needed)
# http_proxy = "http://proxy.example.com:8080"
# https_proxy = "http://proxy.example.com:8080"
# ftp_proxy = "http://proxy.example.com:8080"
# no_proxy = "localhost,127.0.0.0/8,.example.com"

# ============================================================================
# SDK Settings
# ============================================================================
# Generate SDK with toolchain and development headers
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDK_ARCH}-${IMAGE_BASENAME}-${TUNE_PKGARCH}"
SDK_VERSION = "${DISTRO_VERSION}"
SDK_PACKAGE_ARCHS = "all ${TUNE_PKGARCH} ${SDK_ARCH}-nativesdk"

# ============================================================================
# License Settings
# ============================================================================
# Accept the license agreements for the build
LICENSE_FLAGS_ACCEPTED = "commercial"

# ============================================================================
# Package Configuration
# ============================================================================
# Additional packages to include in all images
IMAGE_INSTALL:append = " \
    packagegroup-core-boot \
    packagegroup-base-extended \
    kernel-modules \
    \
    i2c-tools \
    spi-tools \
    usbutils \
    pciutils \
    \
    python3 \
    python3-pip \
    python3-serial \
    python3-json \
    \
    git \
    vim \
    tmux \
    htop \
    \
    connman \
    connman-client \
    \
    openssl \
    openssh \
    \
    docker \
    docker-compose \
    \
    qtbase \
    qtdeclarative \
    qtquickcontrols2 \
    qtsensors \
    qtserialport \
    qtwebsockets \
    qtmultimedia \
    \
    sensor-service \
    device-manager \
    gui-app \
    "

# ============================================================================
# Distro Features
# ============================================================================
# Additional distro features to enable
DISTRO_FEATURES:append = " \
    systemd \
    bluetooth \
    wifi \
    usbhost \
    usbgadget \
    i2c \
    spi \
    gpio \
    pci \
    vulkan \
    opengl \
    wayland \
    x11 \
    security \
    selinux \
    "

# ============================================================================
# Init System
# ============================================================================
# Use systemd as the init system
VIRTUAL-RUNTIME_init_manager = "systemd"
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:remove = "sysvinit"

# ============================================================================
# Kernel Configuration
# ============================================================================
# The kernel to use for the build
PREFERRED_PROVIDER_virtual/kernel = "linux-ti"
PREFERRED_VERSION_linux-ti = "6.1%"

# Kernel configuration fragments
KERNEL_CONFIG_FRAGMENTS = " \
    ${TOPDIR}/../sources/meta-custom/recipes-kernel/linux/linux-ti/bbbai64.cfg \
    "

# Device tree to use
KERNEL_DEVICETREE = " \
    ti/k3-j721e-beagleboneai64.dtb \
    ti/k3-j721e-beagleboneai64-imx219.dtbo \
    ti/k3-j721e-beagleboneai64-ov5640.dtbo \
    "

# ============================================================================
# U-Boot Configuration
# ============================================================================
# U-Boot settings
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-ti"
PREFERRED_VERSION_u-boot-ti = "2023.04%"

# ============================================================================
# System Optimization
# ============================================================================
# Optimization flags
TUNE_CCARGS:append = " -O2 -pipe"
FULL_OPTIMIZATION = "-O2 -pipe"

# Debugging symbols
TARGET_CPPFLAGS:append = " -D_GLIBCXX_USE_CXX11_ABI=1"

# ============================================================================
# Security Settings
# ============================================================================
# Enable security hardening
SECURITY_CFLAGS = "-fstack-protector-strong -fpie -fstack-clash-protection -fcf-protection"
SECURITY_LDFLAGS = "-z noexecstack -z relro -z now"

# ============================================================================
# Build Performance
# ============================================================================
# Disable QA checks for faster builds (use with caution)
# INHIBIT_PACKAGE_DEBUG_SPLIT = "1"
# INHIBIT_PACKAGE_STRIP = "1"

# ============================================================================
# Misc Settings
# ============================================================================
# Set the timezone
TIMEZONE = "UTC"

# Set the locale
LANG = "en_US.UTF-8"

# Enable build history
BUILD_HISTORY = "1"
BUILD_HISTORY_FEATURES = "image package sdk"

# ============================================================================
# Custom Layer Settings
# ============================================================================
# Include custom layers
BBLAYERS = " \
    ${TOPDIR}/../sources/meta-custom \
    "

# Prepend to BBPATH for custom configurations
BBPATH:prepend = "${TOPDIR}/../sources/meta-custom:"

# ============================================================================
# Additional Settings
# ============================================================================
# Enable additional package formats for compatibility
PACKAGE_EXTRA_ARCHS:append = " aarch64 armv7a"

# Enable multilib support for 32-bit compatibility
# MULTILIBS = "multilib:lib32"
# DEFAULTTUNE:virtclass-multilib-lib32 = "armv7athf"

# ============================================================================
# BeagleBone AI-64 Specific Settings
# ============================================================================
# Enable AI/ML features
MACHINE_FEATURES:append = " ai ml"

# Enable graphics acceleration
MACHINE_FEATURES:append = " gpu"

# Enable camera support
MACHINE_FEATURES:append = " camera"

# Enable display support
MACHINE_FEATURES:append = " display"

# Enable audio support
MACHINE_FEATURES:append = " audio"

# ============================================================================
# End of local.conf
# ============================================================================
