# This file defines the layers that are used in the build.
# The priority of layers is determined by the order in which they are listed.
# Layers earlier in the list have higher priority.

# ============================================================================
# Base Configuration
# ============================================================================
# LAYER_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
LCONF_VERSION = "7"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

# ============================================================================
# Layer List
# ============================================================================
BBLAYERS ?= " \
    ${TOPDIR}/../sources/poky/meta \
    ${TOPDIR}/../sources/poky/meta-poky \
    ${TOPDIR}/../sources/poky/meta-yocto-bsp \
    \
    ${TOPDIR}/../sources/meta-openembedded/meta-oe \
    ${TOPDIR}/../sources/meta-openembedded/meta-python \
    ${TOPDIR}/../sources/meta-openembedded/meta-networking \
    ${TOPDIR}/../sources/meta-openembedded/meta-filesystems \
    ${TOPDIR}/../sources/meta-openembedded/meta-webserver \
    \
    ${TOPDIR}/../sources/meta-qt6 \
    \
    ${TOPDIR}/../sources/meta-ti \
    \
    ${TOPDIR}/../sources/meta-security \
    \
    ${TOPDIR}/../sources/meta-virtualization \
    \
    ${TOPDIR}/../sources/meta-swupdate \
    \
    ${TOPDIR}/../sources/meta-custom \
    "

# ============================================================================
# Layer Priorities
# ============================================================================
# Layer priorities - higher number = higher priority
BBLAYERS_PRIORITY = " \
    meta:5 \
    meta-poky:6 \
    meta-yocto-bsp:6 \
    meta-oe:7 \
    meta-python:7 \
    meta-networking:7 \
    meta-filesystems:7 \
    meta-webserver:7 \
    meta-qt6:8 \
    meta-ti:8 \
    meta-security:8 \
    meta-virtualization:8 \
    meta-swupdate:8 \
    meta-custom:9 \
    "

# ============================================================================
# Layer Directories
# ============================================================================
# Additional layer directories to search
BBLAYERS_DIR = "${TOPDIR}/../sources"

# ============================================================================
# End of bblayers.conf
# ============================================================================
