
## Complete qmake/mkspecs/linux-arm-gnueabi-g++/qmake.conf

```makefile
# ============================================================================
# qmake.conf for BBB AI-64 ARM Cross-Compilation
# ============================================================================
# This configuration file is used for cross-compiling Qt6 applications
# targeting the BeagleBone Black AI-64 platform.
#
# Usage:
#   qmake -spec sdk/qmake/mkspecs/linux-arm-gnueabi-g++
#   or
#   export QMAKESPEC=sdk/qmake/mkspecs/linux-arm-gnueabi-g++
#   qmake
# ============================================================================

# ============================================================================
# Base Configuration
# ============================================================================
MAKEFILE_GENERATOR = UNIX
CONFIG += incremental
QMAKE_INCREMENTAL_STYLE = sublib

# ============================================================================
# Include Common Configurations
# ============================================================================
include(../common/linux.conf)
include(../common/gcc-base-unix.conf)
include(../common/g++-unix.conf)

# ============================================================================
# Toolchain Settings
# ============================================================================
# Cross-compiler prefix (adjust to your SDK)
CROSS_COMPILE = arm-poky-linux-gnueabi-

# Compilers and tools
QMAKE_CC                = $$CROSS_COMPILE}gcc
QMAKE_CXX               = $$CROSS_COMPILE}g++
QMAKE_LINK              = $$CROSS_COMPILE}g++
QMAKE_LINK_SHLIB        = $$CROSS_COMPILE}g++
QMAKE_LINK_APP          = $$CROSS_COMPILE}g++
QMAKE_AR                = $$CROSS_COMPILE}ar cqs
QMAKE_OBJCOPY           = $$CROSS_COMPILE}objcopy
QMAKE_STRIP             = $$CROSS_COMPILE}strip
QMAKE_RANLIB            = $$CROSS_COMPILE}ranlib
QMAKE_NM                = $$CROSS_COMPILE}nm

# ============================================================================
# Sysroot
# ============================================================================
# Path to the target sysroot (adjust to your SDK location)
QMAKE_DEFAULT_SYSROOT = /opt/poky/1.0/sysroots/cortexa72-poky-linux

# ============================================================================
# Compiler Flags
# ============================================================================
# Base optimization flags
QMAKE_CFLAGS            = -O2 -pipe -g -feliminate-unused-debug-types
QMAKE_CXXFLAGS          = -O2 -pipe -g -feliminate-unused-debug-types

# Debug/Release variants
QMAKE_CFLAGS_DEBUG      = -O0 -g
QMAKE_CFLAGS_RELEASE    = -O2 -pipe
QMAKE_CXXFLAGS_DEBUG    = -O0 -g
QMAKE_CXXFLAGS_RELEASE  = -O2 -pipe

# Architecture-specific flags for Cortex-A72
QMAKE_CFLAGS            += -mcpu=cortex-a72 -mtune=cortex-a72
QMAKE_CXXFLAGS          += -mcpu=cortex-a72 -mtune=cortex-a72

# NEON and floating-point
QMAKE_CFLAGS            += -mfpu=neon -mfloat-abi=hard
QMAKE_CXXFLAGS          += -mfpu=neon -mfloat-abi=hard

# Security hardening
QMAKE_CFLAGS            += -fstack-protector-strong -fPIE
QMAKE_CXXFLAGS          += -fstack-protector-strong -fPIE

# C++ standard
QMAKE_CXXFLAGS          += -std=c++17

# ============================================================================
# Linker Flags
# ============================================================================
# Runtime library path
QMAKE_LFLAGS            = -Wl,-rpath-link,$$QMAKE_DEFAULT_SYSROOT/usr/lib
QMAKE_LFLAGS            += -Wl,-z,relro,-z,now
QMAKE_LFLAGS            += -Wl,--no-undefined

# Shared library flags
QMAKE_LFLAGS_SHLIB      = -shared
QMAKE_LFLAGS_PLUGIN     = -shared
QMAKE_LFLAGS_SONAME     = -Wl,-soname,

# Release/optimization flags
QMAKE_LFLAGS_RELEASE    = -Wl,-O1
QMAKE_LFLAGS_DEBUG      = 

# ============================================================================
# Include and Library Paths
# ============================================================================
# System includes
QMAKE_INCDIR            = $$QMAKE_DEFAULT_SYSROOT/usr/include
QMAKE_INCDIR_QT         = $$QMAKE_DEFAULT_SYSROOT/usr/include/qt6
QMAKE_INCDIR_OPENGL     = $$QMAKE_DEFAULT_SYSROOT/usr/include/GL
QMAKE_INCDIR_OPENGL_ES2 = $$QMAKE_DEFAULT_SYSROOT/usr/include/GLES2
QMAKE_INCDIR_EGL        = $$QMAKE_DEFAULT_SYSROOT/usr/include

# System libraries
QMAKE_LIBDIR            = $$QMAKE_DEFAULT_SYSROOT/usr/lib
QMAKE_LIBDIR_QT         = $$QMAKE_DEFAULT_SYSROOT/usr/lib
QMAKE_LIBDIR_OPENGL     = $$QMAKE_DEFAULT_SYSROOT/usr/lib

# ============================================================================
# Qt Configuration
# ============================================================================
# Qt version
QT_MAJOR_VERSION = 6
QT_MINOR_VERSION = 4
QT_PATCH_VERSION = 2

# Qt features
QT_CONFIG += \
    shared \
    release \
    reduce_relocations \
    accessibility \
    accessibility-atspi-bridge \
    linuxfb \
    eglfs \
    eglfs_viv \
    eglfs_rc \
    eglfs_egldevice \
    eglfs_gbm \
    eglfs_openwfd \
    gbm \
    xcb \
    xcb_xlib \
    system-xcb \
    xlib \
    glib \
    iconv \
    icu \
    png \
    freetype \
    harfbuzz \
    jpeg \
    gif \
    zlib \
    openssl \
    opengl \
    opengles2 \
    vulkan \
    udev \
    evdev \
    libinput \
    ts-lib \
    systemd \
    journald \
    dbus \
    dbus_linked \
    qpa

# ============================================================================
# QPA (Qt Platform Abstraction)
# ============================================================================
QPA_DEFAULT_PLATFORM = linuxfb
QMAKE_QPA_PLATFORM = linuxfb
QMAKE_QPA_PLATFORM_DEPEND = udev

# ============================================================================
# pkg-config
# ============================================================================
PKG_CONFIG = pkg-config
PKG_CONFIG_SYSROOT_DIR = $$QMAKE_DEFAULT_SYSROOT
PKG_CONFIG_LIBDIR = $$QMAKE_DEFAULT_SYSROOT/usr/lib/pkgconfig:$$QMAKE_DEFAULT_SYSROOT/usr/share/pkgconfig

# ============================================================================
# Install Paths
# ============================================================================
QMAKE_INSTALL_PREFIX = /usr
QMAKE_INSTALL_BINDIR = $$QMAKE_INSTALL_PREFIX/bin
QMAKE_INSTALL_LIBDIR = $$QMAKE_INSTALL_PREFIX/lib
QMAKE_INSTALL_HEADERS = $$QMAKE_INSTALL_PREFIX/include
QMAKE_INSTALL_DATADIR = $$QMAKE_INSTALL_PREFIX/share
QMAKE_INSTALL_MANPAGES = $$QMAKE_INSTALL_DATADIR/man

# ============================================================================
# End of qmake.conf
# ============================================================================
